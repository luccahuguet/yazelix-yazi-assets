# SSH host - icon only
[hostname]
format = "[ $ssh_symbol]($style)"
ssh_symbol = "о¬Ғ"

# Directory - show only current folder name
[directory]
truncation_length = 1
truncate_to_repo = false
format = "[$path]($style)"

# Git branch - space separated
[git_branch]
format = "[ $branch]($style)"
symbol = ""

# Git status - space separated
[git_status]
format = "[ ($all_status$ahead_behind)]($style)"
conflicted = "="
ahead = "вҮЎ"
behind = "вҮЈ"
diverged = "вҮ•"
up_to_date = ""
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "r"
deleted = "x"

# Disable time-based modules
[cmd_duration]
disabled = true

[time]
disabled = true
